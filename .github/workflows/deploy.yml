name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js 20 (Force Install)
        run: |
          # Remove any existing node installations to avoid conflicts
          sudo rm -rf /usr/local/bin/node /usr/local/bin/npm /usr/lib/node_modules
          
          # Download and install Node.js 20 directly from official source
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 20
          nvm use 20
          nvm alias default 20
          
          # Verify version
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          
          # Ensure the new node is in PATH for subsequent steps
          echo "$(nvm which 20)/.." >> $GITHUB_PATH
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Copy 404.html for SPA routing
        run: cp public/404.html dist/404.html
        
      - name: List dist contents
        run: ls -la dist/
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
