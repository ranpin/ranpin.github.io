name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js 20 (Direct Binary)
        run: |
          # Download Node.js 20.19.0 binary directly (required by Vite 5.4+)
          curl -o node-v20.tar.gz https://nodejs.org/dist/v20.19.0/node-v20.19.0-linux-x64.tar.gz
          tar -xzf node-v20.tar.gz
          
          # Add to PATH for subsequent steps
          echo "$(pwd)/node-v20.19.0-linux-x64/bin" >> $GITHUB_PATH
          
          # Verify version
          node -v
          npm -v
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Copy 404.html for SPA routing
        run: cp public/404.html dist/404.html
        
      - name: List dist contents
        run: ls -la dist/
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
